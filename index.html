<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
'use strict';

const CFG_KEY = 'barinv_cfg';

let SB = null;
let QR_SCANNER = null;
let IDB = null;
let OFFLINE_QUEUE = [];
let CLICK_STATE = {};
let _toastTimer;
let REALTIME_CHANNEL = null;

let SESSION = {
  type: null,
  user: null,
  role: null,
  selectedAction: 'REQUEST',
  scannerActive: false,
  modalCb: null,
  cache: {
    bars: [],
    stations: [],
    items: [],
    staff: [],
    nights: [],
    placements: []
  }
};

function qs(id) {
  return document.getElementById(id);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDateInputLocal(date = new Date()) {
  const tzOffsetMs = date.getTimezoneOffset() * 60000;
  return new Date(date.getTime() - tzOffsetMs).toISOString().slice(0, 10);
}

function toast(msg, type = 't-info') {
  const el = qs('toast');
  if (!el) return;
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => {
    el.className = '';
  }, 3000);
}

function getConfig() {
  try {
    return JSON.parse(localStorage.getItem(CFG_KEY) || 'null');
  } catch {
    return null;
  }
}

function initSupabase(url, key) {
  try {
    SB = supabase.createClient(url, key);
    return true;
  } catch {
    return false;
  }
}

async function openIDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open('barinv_queue', 1);

    req.onupgradeneeded = (e) => {
      e.target.result.createObjectStore('queue', { keyPath: 'id', autoIncrement: true });
    };

    req.onsuccess = (e) => {
      IDB = e.target.result;
      resolve();
    };

    req.onerror = () => {
      console.warn('IDB unavailable, falling back to memory queue');
      resolve();
    };
  });
}

async function queuePush(record) {
  if (!IDB) {
    OFFLINE_QUEUE.push(record);
    updateQueueBadge(OFFLINE_QUEUE.length);
    return;
  }

  await new Promise((resolve, reject) => {
    const tx = IDB.transaction('queue', 'readwrite');
    tx.objectStore('queue').add(record).onsuccess = resolve;
    tx.onerror = reject;
  });

  updateQueueBadge(await queueCount());
}

async function queueAll() {
  if (!IDB) return [...OFFLINE_QUEUE];

  return new Promise((resolve, reject) => {
    const req = IDB.transaction('queue').objectStore('queue').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = reject;
  });
}

async function queueDelete(id) {
  if (!IDB) {
    OFFLINE_QUEUE = OFFLINE_QUEUE.filter((_, idx) => idx !== id);
    return;
  }

  await new Promise((resolve, reject) => {
    const tx = IDB.transaction('queue', 'readwrite');
    tx.objectStore('queue').delete(id).onsuccess = resolve;
    tx.onerror = reject;
  });
}

async function queueCount() {
  if (!IDB) return OFFLINE_QUEUE.length;

  return new Promise((resolve, reject) => {
    const req = IDB.transaction('queue').objectStore('queue').count();
    req.onsuccess = () => resolve(req.result);
    req.onerror = reject;
  });
}

function updateQueueBadge(count) {
  const badge = qs('queue-badge');
  const countEl = qs('queue-count');
  if (!badge || !countEl) return;

  countEl.textContent = String(count);
  badge.classList.toggle('show', count > 0);
}

async function flushQueue() {
  if (!SB) return;

  const queued = await queueAll();
  if (!queued.length) return;

  toast(`Syncing ${queued.length} queued event(s)…`, 't-warn');

  let synced = 0;
  for (const item of queued) {
    try {
      const { error } = await SB.from('events').insert(item.data);
      if (!error) {
        await queueDelete(item.id);
        synced++;
      }
    } catch {
      // leave item in queue
    }
  }

  updateQueueBadge(await queueCount());

  if (synced > 0) {
    toast(`${synced} event(s) synced`, 't-ok');
  }
}

function setupNetworkListeners() {
  const banner = qs('offline-banner');

  const update = async () => {
    const offline = !navigator.onLine;
    if (banner) banner.classList.toggle('show', offline);
    if (!offline) await flushQueue();
  };

  window.addEventListener('online', update);
  window.addEventListener('offline', update);
  update();
}

function openModal(title, bodyHTML, okCb, footHTML) {
  qs('modal-title').textContent = title;
  qs('modal-body').innerHTML = bodyHTML;

  const foot = qs('modal-foot');
  if (footHTML !== undefined) {
    foot.innerHTML = footHTML;
  } else {
    foot.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-a btn-sm" onclick="modalOK()">Save</button>
    `;
  }

  SESSION.modalCb = okCb;
  qs('modal-overlay').classList.add('open');

  setTimeout(() => {
    document.querySelector('#modal input, #modal select, #modal textarea')?.focus();
  }, 50);
}

function closeModal() {
  qs('modal-overlay').classList.remove('open');
  SESSION.modalCb = null;
}

function modalOK() {
  if (typeof SESSION.modalCb === 'function') {
    SESSION.modalCb();
  }
}

function showSetupWizard() {
  qs('setup-wizard').style.display = 'flex';
  qs('login-screen').style.display = 'none';
  qs('app').style.display = 'none';
}

function showLoginScreen() {
  qs('setup-wizard').style.display = 'none';
  qs('login-screen').style.display = 'flex';
  qs('app').style.display = 'none';
}

function showApp() {
  qs('setup-wizard').style.display = 'none';
  qs('login-screen').style.display = 'none';
  qs('app').style.display = 'flex';
}

async function saveConfig() {
  const url = qs('ws-url').value.trim();
  const key = qs('ws-key').value.trim();
  const alertEl = qs('ws-alert');

  alertEl.className = 'alert';

  if (!url || !key) {
    alertEl.textContent = 'Both fields are required.';
    alertEl.className = 'alert alert-err show';
    return;
  }

  if (!initSupabase(url, key)) {
    alertEl.textContent = 'Invalid URL or key format.';
    alertEl.className = 'alert alert-err show';
    return;
  }

  alertEl.textContent = 'Testing connection…';
  alertEl.className = 'alert alert-info show';

  try {
    const { error } = await SB.from('bars').select('id').limit(1);
    if (error && error.code !== 'PGRST116') {
      throw new Error(error.message);
    }
  } catch (e) {
    alertEl.textContent = `Connection failed: ${e.message}`;
    alertEl.className = 'alert alert-err show';
    return;
  }

  localStorage.setItem(CFG_KEY, JSON.stringify({ url, key }));
  showLoginScreen();
}

function resetConfig() {
  localStorage.removeItem(CFG_KEY);
  location.reload();
}

function switchLoginTab(tab) {
  document.querySelectorAll('.login-tab').forEach((el, i) => {
    el.classList.toggle('active', (tab === 'admin' && i === 0) || (tab === 'barback' && i === 1));
  });

  qs('lp-admin').classList.toggle('active', tab === 'admin');
  qs('lp-barback').classList.toggle('active', tab === 'barback');
}

async function doAdminLogin() {
  const email = qs('l-email').value.trim();
  const pass = qs('l-pass').value;
  const errEl = qs('login-err');

  errEl.className = 'alert';

  if (!email || !pass) {
    errEl.textContent = 'Email and password required.';
    errEl.className = 'alert alert-err show';
    return;
  }

  try {
    const { data, error } = await SB.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;

    SESSION.type = 'admin';
    SESSION.user = data.user;
    SESSION.role = 'admin';

    await startApp();
  } catch (e) {
    errEl.textContent = e.message || 'Login failed';
    errEl.className = 'alert alert-err show';
  }
}

function showCreateAdmin() {
  openModal(
    'Create Admin Account',
    `
      <div class="field">
        <label>Email</label>
        <input type="email" id="ca-email" placeholder="admin@venue.com">
      </div>
      <div class="field">
        <label>Password (min 6 chars)</label>
        <input type="password" id="ca-pass" placeholder="••••••••">
      </div>
      <div id="ca-alert" class="alert"></div>
    `,
    async () => {
      const email = qs('ca-email').value.trim();
      const pass = qs('ca-pass').value;
      const alertEl = qs('ca-alert');

      if (!email || !pass) {
        alertEl.textContent = 'Both fields required.';
        alertEl.className = 'alert alert-err show';
        return;
      }

      const { error } = await SB.auth.signUp({ email, password: pass });

      if (error) {
        alertEl.textContent = error.message;
        alertEl.className = 'alert alert-err show';
        return;
      }

      alertEl.textContent = 'Account created. Check email confirmation if enabled.';
      alertEl.className = 'alert alert-ok show';
    }
  );
}

async function doNightCodeLogin() {
  const name = qs('bb-name').value.trim();
  const code = qs('bb-code').value.trim();
  const errEl = qs('bb-err');

  errEl.className = 'alert';

  if (!name || !code) {
    errEl.textContent = 'Name and code are required.';
    errEl.className = 'alert alert-err show';
    return;
  }

  if (!/^\d{6}$/.test(code)) {
    errEl.textContent = 'Code must be exactly 6 digits.';
    errEl.className = 'alert alert-err show';
    return;
  }

  try {
    const { data, error } = await SB
      .from('nights')
      .select('*')
      .eq('code', code)
      .eq('active', true)
      .single();

    if (error || !data) throw new Error('Invalid or expired night code.');

    SESSION.type = 'barback';
    SESSION.role = 'barback';
    SESSION.user = {
      name,
      nightId: data.id,
      nightName: data.name,
      nightCode: code,
      nightDate: data.date
    };

    await startApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.className = 'alert alert-err show';
  }
}

async function doLogout() {
  if (SESSION.type === 'admin' && SB) {
    try {
      await SB.auth.signOut();
    } catch {}
  }

  stopScanner();
  teardownRealtime();

  SESSION = {
    type: null,
    user: null,
    role: null,
    selectedAction: 'REQUEST',
    scannerActive: false,
    modalCb: null,
    cache: {
      bars: [],
      stations: [],
      items: [],
      staff: [],
      nights: [],
      placements: []
    }
  };

  showLoginScreen();
}

function updateUserDisplay() {
  const name = SESSION.type === 'admin'
    ? (SESSION.user?.email?.split('@')[0] || 'Admin')
    : (SESSION.user?.name || 'Barback');

  qs('user-disp').textContent = name;

  const roleEl = qs('role-disp');
  if (SESSION.role === 'admin') {
    roleEl.textContent = 'Admin';
    roleEl.className = 'role-chip role-admin';
  } else {
    roleEl.textContent = SESSION.user?.nightName || 'Barback';
    roleEl.className = 'role-chip role-night';
  }
}

function buildNav() {
  const nav = qs('top-nav');
  nav.innerHTML = '';

  const pages = SESSION.role === 'admin'
    ? [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'events', label: 'Events' },
        { id: 'inventory', label: 'Clicker' },
        { id: 'submit', label: 'Submit' },
        { id: 'setup', label: 'Setup' },
        { id: 'nights', label: 'Nights' }
      ]
    : [
        { id: 'submit', label: 'Submit' },
        { id: 'history', label: 'My History' }
      ];

  pages.forEach((page) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.id = `nb-${page.id}`;
    btn.textContent = page.label;
    btn.onclick = () => navigateTo(page.id);
    nav.appendChild(btn);
  });
}

async function preload() {
  try {
    const [bars, stations, items, staff, nights, placements] = await Promise.all([
      SB.from('bars').select('*').order('name'),
      SB.from('stations').select('*, bars(name)').order('name'),
      SB.from('items').select('*').order('name'),
      SB.from('staff').select('*').order('name'),
      SB.from('nights').select('*').order('date', { ascending: false }),
      SB.from('placements').select(`
        *,
        items(*),
        stations(*, bars(*)),
        staff!placements_bartender_id_fkey(*),
        staff!placements_barback_id_fkey(*)
      `)
    ]);

    SESSION.cache.bars = bars.data || [];
    SESSION.cache.stations = stations.data || [];
    SESSION.cache.items = items.data || [];
    SESSION.cache.staff = staff.data || [];
    SESSION.cache.nights = nights.data || [];
    SESSION.cache.placements = placements.data || [];
  } catch (e) {
    console.warn('Preload error:', e);
  }
}

function teardownRealtime() {
  if (REALTIME_CHANNEL && SB) {
    try {
      SB.removeChannel(REALTIME_CHANNEL);
    } catch {}
    REALTIME_CHANNEL = null;
  }
}

function setupRealtime() {
  teardownRealtime();

  if (SESSION.role !== 'admin') return;

  REALTIME_CHANNEL = SB
    .channel('events-live')
    .on(
      'postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'events' },
      () => {
        if (qs('pg-dashboard')?.classList.contains('active')) {
          loadDashboard();
        }
        if (qs('pg-events')?.classList.contains('active')) {
          loadEvents();
        }
      }
    )
    .subscribe();
}

async function startApp() {
  showApp();
  buildNav();
  updateUserDisplay();
  await preload();
  setupRealtime();
  updateQueueBadge(await queueCount());

  if (SESSION.role === 'admin') {
    navigateTo('dashboard');
  } else {
    navigateTo('submit');
    const nightSel = qs('ev-night');
    if (nightSel) nightSel.value = SESSION.user.nightId;
    qs('submit-night-label').textContent = `${SESSION.user.nightName} · ${SESSION.user.nightDate}`;
  }
}

const PAGE_LOADERS = {
  dashboard: loadDashboard,
  events: loadEvents,
  submit: loadSubmitPage,
  history: loadHistory,
  setup: loadSetup,
  nights: loadNights,
  inventory: loadInventory
};

function navigateTo(id) {
  document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach((b) => b.classList.remove('active'));

  qs(`pg-${id}`)?.classList.add('active');
  qs(`nb-${id}`)?.classList.add('active');

  if (id !== 'submit') stopScanner();
  if (PAGE_LOADERS[id]) PAGE_LOADERS[id]();
}

function eventRow(e) {
  const time = e.created_at
    ? new Date(e.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : '—';

  const bar = e.bars?.name || e.bar_name || '—';
  const item = e.items?.name || e.item_name || '—';
  const statusClass = String(e.status || 'PENDING').toLowerCase();

  return `
    <td style="font-family:'Fira Mono',monospace;font-size:11px;">${escapeHtml(time)}</td>
    <td style="font-size:13px;">${escapeHtml(e.submitted_by || '—')}</td>
    <td><span class="action-badge act-${escapeHtml(e.action || 'REQUEST')}">${escapeHtml(e.action || 'REQUEST')}</span></td>
    <td style="font-weight:500;">${escapeHtml(item)}</td>
    <td>${escapeHtml(bar)}</td>
    <td style="font-family:'Fira Mono',monospace;">${escapeHtml(e.qty ?? '—')}</td>
    <td><span class="badge b-${escapeHtml(statusClass)}">${escapeHtml(e.status || 'PENDING')}</span></td>
  `;
}

async function loadDashboard() {
  const nightSel = qs('dash-night');

  if (nightSel) {
    const current = nightSel.value;
    nightSel.innerHTML =
      '<option value="">All Nights</option>' +
      SESSION.cache.nights.map((n) => `<option value="${n.id}">${escapeHtml(n.name)}</option>`).join('');
    nightSel.value = current;
  }

  try {
    let query = SB
      .from('events')
      .select('*, bars(name), stations(name), items(name, sku)')
      .order('created_at', { ascending: false })
      .limit(60);

    const nightId = qs('dash-night')?.value;
    if (nightId) query = query.eq('night_id', nightId);

    const { data: events } = await query;

    const total = (events || []).length;
    const pending = (events || []).filter((e) => e.status === 'PENDING').length;
    const delivered = (events || []).filter((e) => e.action === 'DELIVERED').length;
    const returned = (events || []).filter((e) => e.action === 'RETURNED').length;

    qs('dash-stats').innerHTML = `
      <div class="stat-card sc-a"><div class="stat-val">${total}</div><div class="stat-lbl">Total Events</div></div>
      <div class="stat-card sc-a4"><div class="stat-val">${pending}</div><div class="stat-lbl">Pending</div></div>
      <div class="stat-card sc-a2"><div class="stat-val">${delivered}</div><div class="stat-lbl">Delivered</div></div>
      <div class="stat-card sc-a3"><div class="stat-val">${returned}</div><div class="stat-lbl">Returned</div></div>
    `;

    const tbody = qs('dash-tbody');

    if (!events?.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="7">
            <div class="empty">
              <div class="empty-icon">📋</div>
              <div class="empty-text">No events yet</div>
            </div>
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = events.map((e) => `<tr>${eventRow(e)}</tr>`).join('');

    const lastUpdate = qs('last-update');
    if (lastUpdate) {
      lastUpdate.textContent = 'Updated ' + new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }
  } catch (e) {
    toast('Dashboard error: ' + e.message, 't-err');
  }
}

async function loadSubmitPage() {
  await preload();

  const nightSel = qs('ev-night');
  nightSel.innerHTML =
    '<option value="">— select night —</option>' +
    SESSION.cache.nights
      .filter((n) => n.active)
      .map((n) => `<option value="${n.id}">${escapeHtml(n.name)} (${escapeHtml(n.date)})</option>`)
      .join('');

  if (SESSION.role === 'barback' && SESSION.user?.nightId) {
    nightSel.value = SESSION.user.nightId;
    nightSel.disabled = true;
  } else {
    nightSel.disabled = false;
  }

  const barSel = qs('ev-bar');
  barSel.innerHTML =
    '<option value="">— select bar —</option>' +
    SESSION.cache.bars
      .filter((b) => b.active)
      .map((b) => `<option value="${b.id}">${escapeHtml(b.name)}</option>`)
      .join('');

  qs('ev-station').innerHTML = '<option value="">— select station —</option>';
  populateItemSelect();
}

function populateItemSelect(filter = '') {
  const sel = qs('ev-item');
  const items = SESSION.cache.items.filter((i) => i.active);

  const filtered = filter
    ? items.filter((i) =>
        i.name.toLowerCase().includes(filter.toLowerCase()) ||
        String(i.sku || '').toLowerCase().includes(filter.toLowerCase())
      )
    : items;

  sel.innerHTML =
    '<option value="">— select item —</option>' +
    filtered
      .map((i) => {
        const label = i.sku ? `${i.name} · ${i.sku}` : i.name;
        return `<option value="${i.id}" data-sku="${escapeHtml(i.sku || '')}">${escapeHtml(label)}</option>`;
      })
      .join('');
}

function filterItems() {
  populateItemSelect(qs('ev-search').value);
}

function onBarChange() {
  const barId = qs('ev-bar').value;
  const stationSel = qs('ev-station');

  const stations = SESSION.cache.stations.filter(
    (s) => String(s.bar_id) === String(barId) && s.active
  );

  stationSel.innerHTML =
    '<option value="">— select station —</option>' +
    stations.map((s) => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
}

function onItemSelect() {
  const sel = qs('ev-item');
  const opt = sel.options[sel.selectedIndex];
  if (opt?.dataset?.sku) {
    qs('ev-search').value = opt.dataset.sku;
    showSkuFound(opt.textContent || '');
  }
}

function showSkuFound(text) {
  const el = qs('sku-found');
  el.textContent = '✓ ' + text;
  el.style.display = 'block';
}

function pickAction(action) {
  SESSION.selectedAction = action;
  ['REQUEST', 'DELIVERED', 'RETURNED'].forEach((a) => {
    qs(`ao-${a}`)?.classList.toggle('sel', a === action);
  });
}

async function submitEvent() {
  const nightId = qs('ev-night').value || null;
  const barId = qs('ev-bar').value || null;
  const stationId = qs('ev-station').value || null;
  const itemId = qs('ev-item').value || null;
  const qty = parseFloat(qs('ev-qty').value);
  const notes = qs('ev-notes').value.trim() || null;
  const action = SESSION.selectedAction;

  const by = SESSION.role === 'admin'
    ? (SESSION.user?.email?.split('@')[0] || 'admin')
    : SESSION.user?.name;

  if (!nightId) {
    toast('Select a night', 't-err');
    return;
  }

  if (!barId) {
    toast('Select a bar', 't-err');
    return;
  }

  if (!stationId) {
    toast('Select a station', 't-err');
    return;
  }

  if (!itemId) {
    toast('Select an item', 't-err');
    return;
  }

  if (!Number.isFinite(qty) || qty <= 0) {
    toast('Enter a valid quantity', 't-err');
    return;
  }

  const record = {
    night_id: nightId,
    bar_id: barId,
    station_id: stationId,
    item_id: itemId,
    qty,
    action,
    notes,
    submitted_by: by,
    status: 'PENDING'
  };

  if (!navigator.onLine) {
    await queuePush({ data: record });
    toast('Offline — event queued', 't-warn');
  } else {
    const { error } = await SB.from('events').insert(record);
    if (error) {
      toast('Error: ' + error.message, 't-err');
      return;
    }
    toast(`${action} submitted`, 't-ok');
  }

  qs('ev-item').value = '';
  qs('ev-search').value = '';
  qs('ev-qty').value = '1';
  qs('ev-notes').value = '';
  qs('sku-found').style.display = 'none';
  populateItemSelect();
}

async function toggleScanner() {
  if (SESSION.scannerActive) {
    stopScanner();
    return;
  }
  await startScanner();
}

async function startScanner() {
  const area = qs('scanner-area');
  const hint = qs('scanner-hint');
  const btn = qs('scan-btn');
  const qrDiv = qs('qr-reader');

  if (typeof Html5Qrcode === 'undefined') {
    toast('Scanner library not loaded', 't-err');
    return;
  }

  try {
    await navigator.mediaDevices.getUserMedia({ video: true });

    QR_SCANNER = new Html5Qrcode('qr-reader');
    SESSION.scannerActive = true;

    qrDiv.style.display = 'block';
    hint.style.display = 'none';
    area.classList.add('scanning');
    btn.textContent = '⏹ Stop Scanner';

    await QR_SCANNER.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => {
        stopScanner();
        handleScannedCode(decodedText);
      },
      () => {}
    );
    return;
  } catch {
    SESSION.scannerActive = false;
    qrDiv.style.display = 'none';
    hint.style.display = 'block';
    area.classList.remove('scanning');
    btn.textContent = '📷 Scan Barcode';
  }

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.style.display = 'none';

  document.body.appendChild(input);

  input.onchange = async () => {
    const file = input.files?.[0];
    document.body.removeChild(input);

    if (!file) return;

    hint.textContent = 'Processing image...';

    try {
      const tmpId = 'qr-tmp-' + Date.now();
      const tmpDiv = document.createElement('div');
      tmpDiv.id = tmpId;
      tmpDiv.style.display = 'none';
      document.body.appendChild(tmpDiv);

      const scanner = new Html5Qrcode(tmpId);
      const result = await scanner.scanFile(file, false);

      try {
        await scanner.clear();
      } catch {}

      tmpDiv.remove();
      handleScannedCode(result);
    } catch {
      toast('Could not read barcode. Try a clearer photo.', 't-err');
      hint.textContent = 'Tap "Scan Barcode" to use camera, or search below';
    }
  };

  toast('Take a photo of the barcode', 't-info');
  input.click();
}

function stopScanner() {
  const area = qs('scanner-area');
  const hint = qs('scanner-hint');
  const btn = qs('scan-btn');
  const qrDiv = qs('qr-reader');

  if (QR_SCANNER) {
    try {
      QR_SCANNER.stop().catch(() => {});
    } catch {}
    try {
      QR_SCANNER.clear().catch(() => {});
    } catch {}
    QR_SCANNER = null;
  }

  SESSION.scannerActive = false;

  if (qrDiv) {
    qrDiv.style.display = 'none';
    qrDiv.innerHTML = '';
  }
  if (hint) {
    hint.style.display = 'block';
    hint.textContent = 'Tap "Scan Barcode" to use camera, or search below';
  }
  if (area) area.classList.remove('scanning');
  if (btn) btn.textContent = '📷 Scan Barcode';
}

function handleScannedCode(code) {
  const normalized = String(code || '').trim();
  qs('ev-search').value = normalized;

  const item = SESSION.cache.items.find(
    (i) => String(i.sku || '').toLowerCase() === normalized.toLowerCase()
  );

  if (item) {
    qs('ev-item').value = item.id;
    showSkuFound(`${item.name} (${item.unit})`);
    toast(`Item found: ${item.name}`, 't-ok');
  } else {
    populateItemSelect(normalized);
    toast(`SKU ${normalized} not found in catalog`, 't-info');
  }
}

async function loadEvents() {
  const nightFilter = qs('ef-night');
  const barFilter = qs('ef-bar');

  const currentNight = nightFilter.value;
  const currentBar = barFilter.value;

  nightFilter.innerHTML =
    '<option value="">All Nights</option>' +
    SESSION.cache.nights.map((n) => `<option value="${n.id}">${escapeHtml(n.name)}</option>`).join('');

  barFilter.innerHTML =
    '<option value="">All Bars</option>' +
    SESSION.cache.bars.map((b) => `<option value="${b.id}">${escapeHtml(b.name)}</option>`).join('');

  nightFilter.value = currentNight;
  barFilter.value = currentBar;

  let query = SB
    .from('events')
    .select('*, bars(name), stations(name), items(name, sku)')
    .order('created_at', { ascending: false })
    .limit(200);

  if (nightFilter.value) query = query.eq('night_id', nightFilter.value);
  if (barFilter.value) query = query.eq('bar_id', barFilter.value);

  const statusValue = qs('ef-status').value;
  const actionValue = qs('ef-action').value;

  if (statusValue) query = query.eq('status', statusValue);
  if (actionValue) query = query.eq('action', actionValue);

  const { data: events } = await query;
  const tbody = qs('events-tbody');

  if (!events?.length) {
    tbody.innerHTML = `
      <tr>
        <td colspan="8">
          <div class="empty">
            <div class="empty-icon">📋</div>
            <div class="empty-text">No events</div>
          </div>
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = events.map((e) => {
    const time = new Date(e.created_at).toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });

    const date = new Date(e.created_at).toLocaleDateString([], {
      month: 'short',
      day: 'numeric'
    });

    return `
      <tr>
        <td style="font-family:'Fira Mono',monospace;font-size:11px;">
          ${escapeHtml(time)}<br><span style="color:var(--muted)">${escapeHtml(date)}</span>
        </td>
        <td>${escapeHtml(e.submitted_by || '—')}</td>
        <td><span class="action-badge act-${escapeHtml(e.action)}">${escapeHtml(e.action)}</span></td>
        <td style="font-weight:500;">
          ${escapeHtml(e.items?.name || '—')}
          ${e.items?.sku ? `<br><span style="font-family:'Fira Mono',monospace;font-size:10px;color:var(--muted)">${escapeHtml(e.items.sku)}</span>` : ''}
        </td>
        <td>
          ${escapeHtml(e.bars?.name || '—')}
          <br><span style="font-size:11px;color:var(--muted)">${escapeHtml(e.stations?.name || '')}</span>
        </td>
        <td style="font-family:'Fira Mono',monospace;">${escapeHtml(e.qty)}</td>
        <td><span class="badge b-${escapeHtml(String(e.status).toLowerCase())}">${escapeHtml(e.status)}</span></td>
        <td>
          <div style="display:flex;gap:6px;">
            ${e.status !== 'APPROVED' ? `<button class="btn btn-a2 btn-xs" onclick="setStatus('${e.id}','APPROVED')">✓</button>` : ''}
            ${e.status !== 'REJECTED' ? `<button class="btn btn-danger btn-xs" onclick="setStatus('${e.id}','REJECTED')">✗</button>` : ''}

}

        <label>Room Code (share with barback staff)</label>

          <input type="text" id="m-code" value="${defaultCode}" style="font-family:'Russo One',sans-serif;font-size:24px;letter-spacing:0.2em;max-width:160px;" readonly>
          <button type="button" class="btn btn-ghost btn-sm" onclick="qs('m-code').value = String(100000 + Math.floor(Math.random() * 900000))">Regenerate</button>
        </div>
      </div>
    `,
    async () => {
      const name = qs('m-name').value.trim();
      const date = qs('m-date').value;
      const code = qs('m-code').value;

      if (!name || !date) {
        toast('Name and date required', 't-err');
        return;
      }

      const { error } = await SB.from('nights').insert({ name, date, code });

      if (error) {
        toast(error.message, 't-err');
        return;
      }

      closeModal();
      await preload();
      loadNights();
      toast('Night created', 't-ok');
    }
  );
}

async function toggleNight(id, active) {
  const { error } = await SB.from('nights').update({ active }).eq('id', id);

  if (error) {
    toast(error.message, 't-err');
    return;
  }

  await preload();
  loadNights();
  toast(active ? 'Night reopened' : 'Night closed', 't-ok');
}

async function copyCode(code) {
  try {
    await navigator.clipboard.writeText(code);
    toast(`Code copied: ${code}`, 't-ok');
  } catch {
    toast(`Code: ${code}`, 't-info');
  }
}

async function loadInventory() {
  const nightSel = qs('inv-night');
  const current = nightSel.value;

  nightSel.innerHTML =
    '<option value="">— Select Night —</option>' +
    SESSION.cache.nights.map((n) => `<option value="${n.id}">${escapeHtml(n.name)} (${escapeHtml(n.date)})</option>`).join('');

  nightSel.value = current;

  const nightId = nightSel.value;
  const container = qs('inv-content');

  if (!nightId) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🍸</div>
        <div class="empty-text">Select a night to start tracking</div>
      </div>
    `;
    return;
  }

  const { bars, stations, placements } = SESSION.cache;

  let html = '';

  bars.filter((b) => b.active).forEach((bar) => {
    const barStations = stations.filter((s) => String(s.bar_id) === String(bar.id) && s.active);
    if (!barStations.length) return;

    html += `
      <div class="click-bar-section">
        <div class="click-bar-name"><span style="color:var(--a);">▸</span> ${escapeHtml(bar.name)}</div>
    `;

    barStations.forEach((st) => {
      const stationPlacements = placements.filter((p) => String(p.station_id) === String(st.id));
      if (!stationPlacements.length) return;

      const bartender = stationPlacements[0]?.['staff!placements_bartender_id_fkey'];
      const barback = stationPlacements[0]?.['staff!placements_barback_id_fkey'];

      html += `
        <div class="click-station">
          <div class="click-station-head">
            <div class="click-station-name">${escapeHtml(st.name)}</div>
            ${bartender ? `<span class="staff-chip sc-bartender"><span class="dot"></span>${escapeHtml(bartender.name)}</span>` : ''}
            ${barback ? `<span class="staff-chip sc-barback"><span class="dot"></span>${escapeHtml(barback.name)}</span>` : ''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 80px 100px 100px;padding:7px 14px;background:rgba(255,255,255,0.01);border-bottom:1px solid var(--border);">
            <div style="font-family:'Fira Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;">Item</div>
            <div style="font-family:'Fira Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;text-align:center;">Placed</div>
            <div style="font-family:'Fira Mono',monospace;font-size:9px;color:var(--a3);letter-spacing:0.15em;text-transform:uppercase;text-align:center;">Taken</div>
            <div style="font-family:'Fira Mono',monospace;font-size:9px;color:var(--a2);letter-spacing:0.15em;text-transform:uppercase;text-align:center;">Returned</div>
          </div>
      `;

      stationPlacements.forEach((p) => {
        const item = p.items;
        const key = `${nightId}_${p.id}`;

        if (!CLICK_STATE[key]) {
          CLICK_STATE[key] = { taken: 0, returned: 0 };
        }

        html += `
          <div class="click-item-row">
            <div>
              <div class="click-item-name">${escapeHtml(item?.name || '?')}</div>
              ${item?.category ? `<div style="font-size:11px;color:var(--muted);">${escapeHtml(item.category)}</div>` : ''}
            </div>
            <div class="click-placed">${escapeHtml(p.qty)}</div>
            <div class="clicker">
              <button class="ck-btn ck-take" onclick="click_adj('${key}','taken',-1)">−</button>
              <div class="ck-val ${CLICK_STATE[key].taken > 0 ? 'nonzero-take' : ''}" id="cv-taken-${key}">${CLICK_STATE[key].taken}</div>
              <button class="ck-btn ck-take" onclick="click_adj('${key}','taken',1)">+</button>
            </div>
            <div class="clicker">
              <button class="ck-btn ck-ret" onclick="click_adj('${key}','returned',-1)">−</button>
              <div class="ck-val ${CLICK_STATE[key].returned > 0 ? 'nonzero-ret' : ''}" id="cv-returned-${key}">${CLICK_STATE[key].returned}</div>
              <button class="ck-btn ck-ret" onclick="click_adj('${key}','returned',1)">+</button>
            </div>
          </div>
        `;
      });

      html += '</div>';
    });

    html += '</div>';
  });

  container.innerHTML = html || `
    <div class="empty">
      <div class="empty-icon">⚙</div>
      <div class="empty-text">No placements set up — add items in Setup</div>
    </div>
  `;
}

function click_adj(key, field, delta) {
  if (!CLICK_STATE[key]) {
    CLICK_STATE[key] = { taken: 0, returned: 0 };
  }

  CLICK_STATE[key][field] = Math.max(0, (CLICK_STATE[key][field] || 0) + delta);

  const el = qs(`cv-${field}-${key}`);
  if (!el) return;

  el.textContent = String(CLICK_STATE[key][field]);
  el.className = 'ck-val';

  if (field === 'taken' && CLICK_STATE[key][field] > 0) {
    el.classList.add('nonzero-take');
  }
  if (field === 'returned' && CLICK_STATE[key][field] > 0) {
    el.classList.add('nonzero-ret');
  }
}

async function init() {
  await openIDB();
  setupNetworkListeners();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  const cfg = getConfig();
  if (!cfg) {
    showSetupWizard();
    return;
  }

  if (!initSupabase(cfg.url, cfg.key)) {
    showSetupWizard();
    return;
  }

  try {
    const { data: { session } } = await SB.auth.getSession();

    if (session) {
      SESSION.type = 'admin';
      SESSION.user = session.user;
      SESSION.role = 'admin';
      await startApp();
      return;
    }
  } catch {}

  showLoginScreen();
}

init();
</script>
